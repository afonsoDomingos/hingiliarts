<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/img/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Hingili Arts Lda - Especialistas em arte mural, pintura publicitária, retratos e mosaicos em Moçambique.">
    <title>Hingili Arts Lda | Admin v2</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;0,800;1,600&display=swap" rel="stylesheet">

    <!-- FontAwesome (Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  </head>
  <body>
    <script>
      (function() {
        const savedTheme = localStorage.getItem('hingili-theme');
        const isManual = localStorage.getItem('hingili-theme-manual') === 'true';
        const hour = new Date().getHours();
        const isNight = hour < 6 || hour >= 18;
        const useDark = isManual && savedTheme ? (savedTheme === 'dark') : isNight;
        if (!useDark) {
          document.body.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
